name: Silicon Hardware Testing

on:
  workflow_dispatch:
    inputs:
      artifact-name:
        required: true
        type: string
      dir-url:
        required: true
        type: string

jobs:
  install-and-test:
    runs-on: [self-hosted, windows]

    env:
      BASE_DIR: D:\MyProjects\githubworkflow
      DRIVER_ZIP: npp.8.9.2.portable.x64.zip
      DRIVER_DIR: D:\MyProjects\githubworkflow\notepad
      FIRMWARE_NAME: data.json
      MARKER_FILE: D:\MyProjects\githubworkflow\notepad\driver_installed.txt

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reboot-aware driver installation
        shell: cmd
        run: |
          if not exist "%MARKER_FILE%" (
              echo === First run: Installing driver ===

              :: Ensure base directory exists
              if not exist "%BASE_DIR%" mkdir "%BASE_DIR%"

              :: Clean old packages
              if exist "%BASE_DIR%\%DRIVER_ZIP%" del /f "%BASE_DIR%\%DRIVER_ZIP%"
              if exist "%DRIVER_DIR%" rmdir /s /q "%DRIVER_DIR%"

              :: Download driver.zip from Artifactory
              echo Downloading driver.zip...
              curl -L -o "%BASE_DIR%\%DRIVER_ZIP%" "${{ inputs.dir-url }}"

              :: Ensure driver directory exists
              if not exist "%DRIVER_DIR%" mkdir "%DRIVER_DIR%"

              :: Extract driver package
              echo Extracting driver package...
              tar -xf "%BASE_DIR%\%DRIVER_ZIP%" -C "%DRIVER_DIR%"

              :: Download firmware artifact
              echo Downloading firmware artifact...
              powershell -Command "Download-File -Url '${{ inputs.artifact-name }}' -OutFile 'artifact\%FIRMWARE_NAME%'"

              :: Verify firmware exists
              if not exist "artifact\%FIRMWARE_NAME%" (
                  echo Firmware binary missing
                  exit /b 1
              )

              :: Replace firmware in driver
              copy /y "artifact\%FIRMWARE_NAME%" "%DRIVER_DIR%\%FIRMWARE_NAME%"

              :: Create marker file
              echo DRIVER_INSTALLED > "%MARKER_FILE%"

              :: Reboot system
              echo Rebooting system in 5 seconds...
              shutdown /r /t 5
              exit /b 0
          ) else (
              echo === System rebooted, continuing with silicon tests ===
          )

      - name: Wait for system stabilization
        shell: cmd
        run: |
          echo Waiting for system to stabilize...
          timeout /t 300

      - name: Verify Python
        shell: cmd
        run: |
          python --version
          pip --version

      - name: Run silicon tests
        shell: cmd
        run: |
          echo Running silicon test package...
          python run_test.py

      - name: Silicon tests completed
        shell: cmd
        run: |
          echo Silicon testing completed successfully