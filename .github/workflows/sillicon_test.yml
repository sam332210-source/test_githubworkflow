name: Silicon Hardware Testing

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      dir-url:
        required: true
        type: string

jobs:

  # -----------------------------
  # JOB 1 - Install Driver
  # -----------------------------
  install-driver:
    runs-on: [self-hosted, windows]

    env:
      BASE_DIR: D:\MyProjects\githubworkflow
      DRIVER_ZIP: npp.8.9.2.portable.x64.zip
      DRIVER_DIR: D:\MyProjects\githubworkflow\notepad
      FIRMWARE_NAME: data.json

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download firmware artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: artifact

    - name: Verify firmware
      shell: cmd
      run: |
        if not exist "artifact\%FIRMWARE_NAME%" (
          echo Firmware binary missing
          exit /b 1
        )

    - name: Ensure base directory exists
      shell: cmd
      run: |
        if not exist "%BASE_DIR%" mkdir "%BASE_DIR%"

    - name: Clean old packages
      shell: cmd
      run: |
        if exist "%BASE_DIR%\%DRIVER_ZIP%" del /f "%BASE_DIR%\%DRIVER_ZIP%"
        if exist "%DRIVER_DIR%" rmdir /s /q "%DRIVER_DIR%"

    - name: Download driver.zip from Artifactory
      shell: cmd
      run: |
        echo Downloading driver.zip...
        curl -L -o "%BASE_DIR%\%DRIVER_ZIP%" "${{ inputs.dir-url }}"

    - name: Ensure driver directory exists
      shell: cmd
      run: |
        if not exist "%DRIVER_DIR%" mkdir "%DRIVER_DIR%"

    - name: Extract driver package
      shell: cmd
      run: |
        echo Extracting driver package...
        tar -xf "%BASE_DIR%\%DRIVER_ZIP%" -C "%DRIVER_DIR%"

    - name: Replace firmware in driver
      shell: cmd
      run: |
        copy /y "artifact\%FIRMWARE_NAME%" "%DRIVER_DIR%\%FIRMWARE_NAME%"

  # -----------------------------
  # JOB 2 - Silicon Testing
  # -----------------------------
  run-silicon-tests:
    needs: install-driver
    runs-on: [self-hosted, windows]

    env:
      DRIVER_DIR: D:\MyProjects\githubworkflow

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Wait for system to stabilize
      shell: cmd
      run: |
        echo Waiting for system to fully boot...
        powershell -Command "Start-Sleep -Seconds 10"

    - name: Show runner PATH
      shell: cmd
      run: echo %PATH%

    - name: List workspace files
      shell: cmd
      run: |
        echo Workspace: %GITHUB_WORKSPACE%
        dir "%GITHUB_WORKSPACE%" /s /b

    - name: Run silicon tests
      shell: cmd
      run: |
        echo Running test package
        python Scripts\run_tests.py

    - name: Silicon tests completed
      shell: cmd
      run: |
        echo Silicon testing completed successfully