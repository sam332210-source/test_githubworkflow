name: Silicon Hardware Auto-Reboot Testing

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      dir-url:
        required: true
        type: string

env:
  BASE_DIR: D:\MyProjects\githubworkflow
  DRIVER_ZIP: aria2-1.37.0-win-32bit-build1.zip
  DRIVER_DIR: D:\MyProjects\githubworkflow\aria2
  SUB_DIR: aria2-1.37.0-win-32bit-build1
  POST_REBOOT_FLAG: D:\MyProjects\githubworkflow\.post_reboot

jobs:
  silicon-test:
    runs-on: [self-hosted, windows]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Determine phase
      shell: cmd
      id: phase
      run: |
        powershell -Command "if (Test-Path '%POST_REBOOT_FLAG%') { Write-Host 'phase=post-reboot'; Write-Output 'phase=post-reboot' } else { Write-Host 'phase=pre-reboot'; Write-Output 'phase=pre-reboot' }" > phase.txt
        set /p PHASE=<phase.txt
        echo PHASE=%PHASE%
        echo phase=%PHASE% >> %GITHUB_OUTPUT%

    - name: Pre-Reboot Setup
      if: steps.phase.outputs.phase == 'pre-reboot'
      shell: cmd
      run: |
        echo Setting up drivers and environment...
        mkdir "%DRIVER_DIR%" 2>nul
        powershell -Command "Expand-Archive -Path '%BASE_DIR%\%DRIVER_ZIP%' -DestinationPath '%DRIVER_DIR%' -Force"

        echo Creating post-reboot marker
        powershell -Command "New-Item -ItemType File -Path '%POST_REBOOT_FLAG%' -Force"

        echo Scheduling system reboot in 15 seconds
        shutdown /r /t 15

    - name: Wait for system to be back online
      if: steps.phase.outputs.phase == 'post-reboot'
      shell: cmd
      run: |
        powershell -Command ^
          "$maxRetries = 60; $retryCount = 0; $hostName = 'localhost';" ^
          "do { Write-Host 'Checking $hostName...';" ^
          "if (Test-Connection -ComputerName $hostName -Count 1 -Quiet) { Write-Host 'Host is online!'; break }" ^
          "else { $retryCount++; Write-Host 'Not reachable yet ($retryCount/$maxRetries)...'; Start-Sleep -Seconds 10 } }" ^
          "while ($retryCount -lt $maxRetries);" ^
          "if ($retryCount -eq $maxRetries) { throw 'System did not come online in time.' }"

    - name: Post-Reboot Silicon Tests
      if: steps.phase.outputs.phase == 'post-reboot'
      shell: cmd
      run: |
        echo Listing workspace files:
        dir "%GITHUB_WORKSPACE%" /s /b

        echo Running silicon test package...
        python Scripts\run_tests.py

        echo Removing post-reboot marker
        powershell -Command "Remove-Item '%POST_REBOOT_FLAG%' -Force"

        echo Silicon testing completed successfully